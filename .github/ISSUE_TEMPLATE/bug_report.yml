name: "🐛 Bug Report / Reporte de Bug"
description: Report a bug in DevForge / Reportar un bug en DevForge
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        > **EN:** Thanks for reporting! Please fill in as much detail as possible.
        > **ES:** ¡Gracias por reportar! Por favor completa tantos detalles como sea posible.

  - type: dropdown
    id: module
    attributes:
      label: Module / Módulo
      description: Which module is affected? / ¿Qué módulo está afectado?
      options:
        - install.sh (main script)
        - core
        - languages
        - frameworks
        - editors
        - terminal
        - macos
        - apps
        - ai
        - dotfiles
        - ios
        - android
        - linux
        - lib/ui.sh
        - lib/utils.sh
        - Other / Otro
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System / Sistema Operativo
      options:
        - macOS 15 Sequoia (Apple Silicon)
        - macOS 15 Sequoia (Intel)
        - macOS 14 Sonoma (Apple Silicon)
        - macOS 14 Sonoma (Intel)
        - macOS 13 Ventura (Apple Silicon)
        - macOS 13 Ventura (Intel)
        - Ubuntu 22.04 / 24.04
        - Debian 12
        - Fedora 40+
        - Manjaro
        - Other Linux
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened? / ¿Qué ocurrió?
      placeholder: |
        EN: e.g. "Running ./install.sh --modules languages fails with 'pyenv: command not found' after Python install"
        ES: ej. "Ejecutar ./install.sh --modules languages falla con 'pyenv: command not found' después de instalar Python"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / Pasos para reproducir
      placeholder: |
        1. ./install.sh --modules languages
        2. Select Python
        3. Error appears
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / Comportamiento esperado
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output / Salida de error
      render: shell

  - type: input
    id: version
    attributes:
      label: DevForge version / Versión
      placeholder: "e.g. v4.1.0 or git sha abc1234"
