name: CI

on:
  push:
    branches: [main]
    paths:
      - '**.sh'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.sh'
      - '.github/workflows/ci.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  shellcheck:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck on all shell scripts
        run: |
          echo "::group::Discovering shell scripts"
          mapfile -t SCRIPTS < <(find . -name "*.sh" -not -path "./.git/*" | sort)
          echo "Found ${#SCRIPTS[@]} scripts"
          for f in "${SCRIPTS[@]}"; do echo "  $f"; done
          echo "::endgroup::"

          echo "::group::Running ShellCheck"
          FAILED=0
          for f in "${SCRIPTS[@]}"; do
            if ! shellcheck --severity=warning --shell=bash "$f"; then
              FAILED=1
            fi
          done
          echo "::endgroup::"

          if [[ $FAILED -eq 1 ]]; then
            echo "::error::ShellCheck found issues. Fix them before merging."
            exit 1
          fi
          echo "All scripts passed ShellCheck."

  syntax-check:
    name: Bash Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check bash syntax
        run: |
          FAILED=0
          while IFS= read -r -d '' f; do
            if ! bash -n "$f" 2>&1; then
              echo "::error file=$f::Syntax error"
              FAILED=1
            fi
          done < <(find . -name "*.sh" -not -path "./.git/*" -print0)
          [[ $FAILED -eq 0 ]] || exit 1

  dry-run:
    name: Dry-run Install (Ubuntu)
    runs-on: ubuntu-latest
    needs: [shellcheck, syntax-check]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run install --help (smoke test)
        run: |
          chmod +x install.sh
          DEVFORGE_DRY_RUN=true bash install.sh --help
