name: Packages Cleanup

on:
  schedule:
    - cron: '0 3 * * 0'  # Sundays at 03:00 UTC
  workflow_run:
    workflows: ["Publish Packages"]
    types: [completed]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cleanup:
    name: Prune old package versions
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      packages: write
    steps:
      - name: Delete untagged devforge versions
        uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: devforge
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old sha- tagged versions (keep last 10)
        uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: devforge
          package-type: container
          min-versions-to-keep: 10
          ignore-versions: '^(latest|\d+\.\d+\.\d+|\d+\.\d+|\d+)$'
          token: ${{ secrets.GITHUB_TOKEN }}
